        //Task 1 — Print numbers 1 to 20

while(z<=20){

//Task 2 — Even Numbers Print only even numbers from 1 to 50.
        let i=2;
do{
    if(i%2==0){
        console.log(i)
    }

//Task 3 — Sum of Numbers Find sum from 1 to 100.
let sum=0;
for (i=1;i<=100;i++){
    sum=sum+i;
}
console.log(sum)
// Task 4 — Find Largest Number
let numbers = [5,12,8,20,3];
let greater=0;
for (let i=0;i<=4;i++){
    if(greater<numbers[i]){
        greater=numbers[i];
    }
}
console.log(greater)
    //Task 5 — Count Vowels
    let word="javascript";
let vowelCount=0;
for(let i=0;i<word.length;i++){
    if(word[i]=="a"||word[i]=="e"||word[i]=="i"||word[i]=="o"||word[i]=="u"){
        vowelCount++;
    }
}
console.log(vowelCount)
