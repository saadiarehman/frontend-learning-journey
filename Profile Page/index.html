<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile Page Using CSS Responsive CARDS</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1>
        Saadia
    </h1>
    <img src="./images/images.jpg" alt="My Photo">
    <div class="cards">
        <div class="card">
            <img src="./images/images.jpg" alt="no card image">
            <h2>About Me</h2>
            <p>I am learning HTML and CSS.</p>
        </div>
        <div class="card">
            <img src="./images/images.jpg" alt="no card image">
            <h2>My Goals</h2>
            <p>I want to become a software developer and build my own software company in the future.</p>
        </div>
        <div class="card">
            <img src="./images/images.jpg" alt="no card image">
            <h2>My Hobbies</h2>
            <p>My hobbies are travelling, cooking, and watching youtube.</p>

        </div>
    </div>
    <button type="button">Contact Me</button>
</body>
</html>
